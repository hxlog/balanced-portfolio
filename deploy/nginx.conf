# Nginx 站点模板 — 复制到 /etc/nginx/sites-available/balanced-portfolio
# 1. 替换 your-domain.example
# 2. certbot --nginx -d your-domain.example  (或自行配置 ssl_certificate)
# 3. ln -s .../sites-available/balanced-portfolio .../sites-enabled/
# 4. nginx -t && systemctl reload nginx

upstream bp_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream bp_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.example;

    # certbot 会自动插入 443 与证书; 首次可先只用 80 测通

    client_max_body_size 20m;

    # Session 登录/Cookie 由 Next.js Route Handler 处理（必须在 /api/ 之前）
    location /api/session {
        proxy_pass http://bp_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://bp_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://bp_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
